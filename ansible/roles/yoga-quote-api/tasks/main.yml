- name: Start yoga quote api generated service
  become: true
  become_user: '{{ podman_rootless_user }}'
  ansible.builtin.shell: |
    set -e
    export XDG_RUNTIME_DIR=/run/user/$(id -u)
    systemctl --user start yoga-quote-api.service
  changed_when: true
