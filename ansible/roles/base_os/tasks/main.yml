---
- name: Disable automatic system upgrades to avoid locks
  ansible.builtin.systemd:
    name: unattended-upgrades
    state: stopped
    enabled: false

- name: Upgrade packages after clean os install
  ansible.builtin.apt:
    update_cache: true
    upgrade: full
    autoremove: true
    autoclean: true
  tags:
    - base_os
    - apt
    - upgrade
