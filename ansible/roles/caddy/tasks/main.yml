---
- name: Ensure caddy config directories exist
  become: true
  become_user: '{{ podman_rootless_user }}'
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    mode: '0755'
  loop:
    - '{{ caddy_config_dir }}'
    - '{{ caddy_data_dir }}'
    - '/home/{{ podman_rootless_user }}/.config/containers/systemd'

- name: Build basic Caddyfile with reverse proxy sites
  become: true
  become_user: '{{ podman_rootless_user }}'
  ansible.builtin.copy:
    dest: '{{ caddy_config_file }}'
    mode: '0644'
    content: |
      # Generated by ansible, do not touch manual
      {
        admin off
      }
      {% for site in caddy_sites %}
      http://{{ site.name }} {
          reverse_proxy host.containers.internal:{{ site.port }}
      }
      {% endfor %}
  notify: Restart caddy service

- name: Install Caddy quadlet
  become: true
  become_user: '{{ podman_rootless_user }}'
  ansible.builtin.copy:
    dest: '/home/{{ podman_rootless_user }}/.config/containers/systemd/caddy.container'
    mode: '0644'
    content: |
      [Unit]
      Description=Caddy reverse proxy
      After=network-online.target
      Wants=network-online.target

      [Container]
      Image={{ caddy_image }}
      ContainerName={{ caddy_container_name }}
      PublishPort={{ caddy_port_http }}:80
      PublishPort={{ caddy_port_https }}:443
      Volume={{ caddy_config_file }}:/etc/caddy/Caddyfile:Z
      Volume={{ caddy_data_dir }}:/data:Z
      AutoUpdate=registry

      [Service]
      Restart=always
      TimeoutStartSec=900

      [Install]
      WantedBy=default.target
  notify: Reload user systemd

- name: Enable podman auto update timer for rootless user
  become: true
  become_user: '{{ podman_rootless_user }}'
  ansible.builtin.systemd:
    name: podman-auto-update.timer
    scope: user
    enabled: true
    state: started

- name: Enable and start caddy service
  become: true
  become_user: '{{ podman_rootless_user }}'
  ansible.builtin.systemd:
    name: caddy.service
    scope: user
    enabled: true
    state: started
